name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "name=ghcr.io/${owner}/fuelstation-os:latest" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: true
          tags: ${{ steps.image.outputs.name }}

      - name: Validate production secrets
        shell: bash
        env:
          DO_HOST: ${{ secrets.DO_HOST }}
          DO_USER: ${{ secrets.DO_USER }}
          DO_SSH_PRIVATE_KEY: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        run: |
          missing=0
          for name in DO_HOST DO_USER DO_SSH_PRIVATE_KEY APP_DOMAIN POSTGRES_PASSWORD AUTH_SECRET; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing required production secret: ${name}"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Prepare Droplet directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          debug: true
          script: |
            set -eu
            sudo mkdir -p /opt/fuelstation-os/backups
            sudo chown -R "$USER":"$USER" /opt/fuelstation-os

      - name: Copy deployment files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          debug: true
          source: "deploy/docker-compose.prod.yml,deploy/Caddyfile"
          target: "/opt/fuelstation-os"

      - name: Deploy on Droplet
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_IMAGE: ${{ steps.image.outputs.name }}
          APP_DOMAIN: ${{ secrets.APP_DOMAIN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          RATE_LIMIT_BACKEND: ${{ secrets.RATE_LIMIT_BACKEND }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USER }}
          key: ${{ secrets.DO_SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.DO_SSH_PASSPHRASE }}
          debug: true
          envs: APP_IMAGE,APP_DOMAIN,POSTGRES_PASSWORD,AUTH_SECRET,RATE_LIMIT_BACKEND,UPSTASH_REDIS_REST_URL,UPSTASH_REDIS_REST_TOKEN,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -eu
            cd /opt/fuelstation-os

            test -f deploy/docker-compose.prod.yml
            test -f deploy/Caddyfile
            mv -f deploy/docker-compose.prod.yml docker-compose.yml
            mv -f deploy/Caddyfile Caddyfile
            rmdir deploy || true

            cat > .env.production <<EOF
            APP_DOMAIN=${APP_DOMAIN}
            APP_IMAGE=${APP_IMAGE}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DATABASE_URL=postgresql://fuelstation:${POSTGRES_PASSWORD}@postgres:5432/fuelstation_os
            AUTH_SECRET=${AUTH_SECRET}
            AUTH_URL=https://${APP_DOMAIN}
            AUTH_TRUST_HOST=true
            NODE_ENV=production
            RATE_LIMIT_BACKEND=${RATE_LIMIT_BACKEND:-memory}
            UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL}
            UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN}
            EOF

            chmod 600 .env.production

            if [ -z "${GHCR_USERNAME:-}" ] || [ -z "${GHCR_TOKEN:-}" ]; then
              echo "Missing GHCR credentials. Configure GHCR_USERNAME/GHCR_TOKEN or allow GitHub token package access."
              exit 1
            fi
            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USERNAME}" --password-stdin

            docker compose --env-file .env.production pull app
            docker compose --env-file .env.production up -d postgres
            docker compose --env-file .env.production run --rm app npm run db:migrate
            docker compose --env-file .env.production up -d --remove-orphans

            app_cid="$(docker compose --env-file .env.production ps -q app)"
            for attempt in $(seq 1 36); do
              health="$(docker inspect -f '{{.State.Health.Status}}' "$app_cid" 2>/dev/null || true)"
              if [ "$health" = "healthy" ]; then
                break
              fi
              echo "Waiting for app health: attempt ${attempt}/36, status=${health:-unknown}"
              sleep 5
            done

            health="$(docker inspect -f '{{.State.Health.Status}}' "$app_cid" 2>/dev/null || true)"
            if [ "$health" != "healthy" ]; then
              echo "App did not become healthy. Recent app logs:"
              docker compose --env-file .env.production logs --tail=120 app || true
              exit 1
            fi

            docker compose --env-file .env.production ps
            docker image prune -af || true

            curl --retry 12 --retry-all-errors --retry-delay 5 -fsS "https://${APP_DOMAIN}/api/health"
