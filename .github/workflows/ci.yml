name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  app:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://fuelstation:fuelstation@localhost:5432/fuelstation_os
      AUTH_SECRET: ci-only-auth-secret-ci-only-auth-secret
      AUTH_URL: http://localhost:3000
      NODE_ENV: test
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Prisma validate
        run: npx prisma validate

      - name: Build
        run: npm run build

      - name: Docker build
        uses: docker/build-push-action@v6
        with:
          context: ./app
          push: false
